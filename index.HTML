<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplicativo de Banco - Metas Financeiras</title>
  <style>
    /* Estilos Gerais */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f5f5f5;
      color: #333;
    }

    .app-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* Cabeçalho */
    .app-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .app-header h1 {
      font-size: 2rem;
      color: #0066cc;
    }

    .saldo p {
      font-size: 1.2rem;
      color: #333;
    }

    /* Metas Financeiras */
    .metas-financeiras h2 {
      font-size: 1.5rem;
      margin-bottom: 15px;
      color: #0066cc;
    }

    .meta-list {
      list-style: none;
      padding: 0;
    }

    .meta-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f1f1f1;
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .meta-info p {
      margin: 5px 0;
    }

    .meta-progresso {
      width: 200px;
      height: 10px;
      background-color: #e0e0e0;
      border-radius: 5px;
      overflow: hidden;
    }

    .barra-progresso {
      height: 100%;
      background-color: #4caf50;
    }

    /* Formulário de Nova Meta */
    .nova-meta h2 {
      font-size: 1.5rem;
      margin-bottom: 15px;
      color: #0066cc;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    form label {
      margin-bottom: 5px;
      font-weight: bold;
    }

    form input {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    form button {
      padding: 10px;
      background-color: #0066cc;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    form button:hover {
      background-color: #004d99;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>Banco X</h1>
      <div class="saldo">
        <p>Saldo Atual: <strong>R$ 5.000,00</strong></p>
      </div>
    </header>

    <main>
      <section class="metas-financeiras">
        <h2>Minhas Metas Financeiras</h2>
        <ul class="meta-list">
          <li>
            <div class="meta-info">
              <p>Viagem para Europa</p>
              <p><strong>R$ 3.000,00</strong> - Meta</p>
            </div>
            <div class="meta-progresso">
              <div class="barra-progresso" style="width: 60%;"></div>
            </div>
          </li>
          <li>
            <div class="meta-info">
              <p>Fundo de Emergência</p>
              <p><strong>R$ 1.500,00</strong> - Meta</p>
            </div>
            <div class="meta-progresso">
              <div class="barra-progresso" style="width: 30%;"></div>
            </div>
          </li>
        </ul>
      </section>

      <section class="nova-meta">
        <h2>Adicionar Nova Meta</h2>
        <form id="nova-meta-form">
          <label for="meta-nome">Nome da Meta</label>
          <input type="text" id="meta-nome" placeholder="Ex: Viagem para o Japão" required>
          
          <label for="meta-valor">Valor da Meta</label>
          <input type="number" id="meta-valor" placeholder="Ex: 5000" required>
          
          <button type="submit">Adicionar Meta</button>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
